<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO Étudiants</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background: linear-gradient(135deg,#e0f2fe,#f8fafc);
    font-family: 'Segoe UI', sans-serif;
    padding:20px;
}
.container{max-width:1300px;margin:auto;}

.card{
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.flex{display:flex;gap:15px;flex-wrap:wrap;}

.stat{flex:1;min-width:200px;text-align:center;}
.stat h2{font-size:2rem;}

input,select{
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    width:100%;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
}
button:hover{background:#1e40af;}

table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #eee;}

.badge{padding:4px 10px;border-radius:10px;font-size:12px;}
.good{background:#dcfce7;}
.mid{background:#fef9c3;}
.bad{background:#fee2e2;}

canvas{height:250px !important;}

#toast{
position:fixed;
top:20px;
right:20px;
background:#2563eb;
color:white;
padding:10px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>
<div class="container">

<div id="toast">Étudiant ajouté ✅</div>

<!-- STATS -->
<div class="flex">
<div class="card stat">
<h3>Moyenne</h3>
<h2 id="mean">--</h2>
</div>

<div class="card stat">
<h3>Écart-type</h3>
<h2 id="std">--</h2>
</div>

<div class="card stat">
<h3>Effectif</h3>
<h2 id="count">0</h2>
</div>
</div>

<!-- FORM -->
<div class="card">
<div class="flex">
<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">
<input id="matricule" placeholder="Matricule">
<input id="age" type="number" value="20">
<select id="sexe">
<option value="F">F</option>
<option value="M">M</option>
</select>
<input id="note" type="number" placeholder="Note /20">
<button onclick="addStudent()">Ajouter</button>
</div>
</div>

<!-- CHARTS -->
<div class="flex">
<div class="card"><canvas id="pie"></canvas></div>
<div class="card"><canvas id="bar"></canvas></div>
<div class="card"><canvas id="hist"></canvas></div>
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>Nom</th>
<th>Note</th>
<th>Z-score</th>
<th>Niveau</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

let students = [];

function level(n){
    if(n>=16) return "Excellent";
    if(n>=14) return "Très bien";
    if(n>=12) return "Bien";
    if(n>=10) return "Passable";
    return "Faible";
}

function renderTable(){
    let html = "";
    students.forEach(s=>{
        let z = s.zscore.toFixed(2);

        let cls = "mid";
        if(z > 1) cls = "good";
        else if(z < -1) cls = "bad";

        html += `
        <tr>
            <td>${s.prenom} ${s.nom}</td>
            <td>${s.note}</td>
            <td><span class="badge ${cls}">${z}</span></td>
            <td>${level(s.note)}</td>
            <td><button onclick="del(${s.id})">❌</button></td>
        </tr>`;
    });
    document.getElementById("table").innerHTML = html;
}

function showToast(){
    let t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",1500);
}

// ---------------- API ----------------

async function loadStudents(){
    const res = await fetch("/api/students");
    const data = await res.json();

    students = data.students;

    document.getElementById("mean").innerText = data.mean.toFixed(2);
    document.getElementById("std").innerText = data.std.toFixed(2);
    document.getElementById("count").innerText = data.count;

    renderTable();
    charts();
}

async function addStudent(){
    let s = {
        prenom: prenom.value,
        nom: nom.value,
        matricule: matricule.value,
        age: parseInt(age.value),
        sexe: sexe.value,
        note: parseFloat(note.value)
    };

    if(!s.prenom || !s.nom || isNaN(s.note)){
        alert("Remplir les champs !");
        return;
    }

    await fetch("/api/students",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(s)
    });

    showToast();
    loadStudents();
}

async function del(id){
    await fetch("/api/students/"+id,{method:"DELETE"});
    loadStudents();
}

// ---------------- CHARTS ----------------

let pieChart, barChart, histChart;

function charts(){

    if(pieChart) pieChart.destroy();
    if(barChart) barChart.destroy();
    if(histChart) histChart.destroy();

    // PIE
    let cats=[0,0,0,0,0];
    students.forEach(s=>{
        if(s.note>=16) cats[0]++;
        else if(s.note>=14) cats[1]++;
        else if(s.note>=12) cats[2]++;
        else if(s.note>=10) cats[3]++;
        else cats[4]++;
    });

    pieChart = new Chart(pie,{
        type:"pie",
        data:{
            labels:["Excellent","Très bien","Bien","Moyen","Faible"],
            datasets:[{data:cats}]
        }
    });

    // BAR
    barChart = new Chart(bar,{
        type:"bar",
        data:{
            labels:students.map(s=>s.prenom),
            datasets:[{data:students.map(s=>s.note)}]
        }
    });

    // HISTOGRAMME
    let bins=new Array(10).fill(0);
    students.forEach(s=>{
        let i=Math.floor(s.note/2);
        if(i>9)i=9;
        bins[i]++;
    });

    histChart = new Chart(hist,{
        type:"bar",
        data:{
            labels:["0-2","2-4","4-6","6-8","8-10","10-12","12-14","14-16","16-18","18-20"],
            datasets:[{data:bins}]
        }
    });
}

// INIT
loadStudents();

</script>
</body>
</html>
