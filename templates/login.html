<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion - Gestion Étudiants</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --primary: #4f46e5;
    --secondary: #7c3aed;
    --bg-light: linear-gradient(135deg, #667eea, #764ba2);
    --bg-dark: #0f172a;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    background: var(--bg-light);
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* DARK MODE */
.dark body {
    background: var(--bg-dark);
}

/* CARD */
.login-card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
    color: white;

    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

/* TITLE */
.login-card h2 {
    font-weight: 600;
    text-align: center;
}

/* INPUT */
.form-control {
    border-radius: 12px;
    padding: 0.75rem;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
}

.form-control::placeholder {
    color: #ddd;
}

/* FOCUS */
.form-control:focus {
    box-shadow: 0 0 0 2px var(--primary);
}

/* BUTTON */
.btn-primary {
    background: var(--primary);
    border: none;
    padding: 0.75rem;
    border-radius: 12px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-primary:hover {
    background: var(--secondary);
    transform: scale(1.02);
}

/* ERROR */
#errorMsg {
    font-size: 0.9rem;
}

/* LOADER */
.spinner-border {
    width: 1rem;
    height: 1rem;
}

/* TOGGLE */
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
    background: white;
    color: black;
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 0.8rem;
    transition: 0.3s;
}

.theme-toggle:hover {
    transform: scale(1.05);
}

/* SHAKE ERROR */
.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% {transform: translateX(0);}
    25% {transform: translateX(-5px);}
    50% {transform: translateX(5px);}
    75% {transform: translateX(-5px);}
    100% {transform: translateX(0);}
}

</style>
</head>

<body>

<div class="theme-toggle" id="themeToggle">🌙 Mode sombre</div>

<div class="login-card" id="card">
    <h2>Connexion</h2>

    <form id="loginForm" autocomplete="off">
        
        <div class="mb-3">
            <label class="form-label">Identifiant</label>
            <input type="text" id="username" class="form-control" placeholder="admin" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" id="password" class="form-control" placeholder="••••" required>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary w-100">
            Se connecter
        </button>

        <div id="errorMsg" class="text-danger mt-3 text-center d-none"></div>

    </form>
</div>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');
const errorDiv = document.getElementById('errorMsg');
const card = document.getElementById('card');

/* LOGIN */
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    btn.disabled = true;
    btn.innerHTML = 'Connexion <span class="spinner-border spinner-border-sm"></span>';

    errorDiv.classList.add('d-none');

    const data = new URLSearchParams();
    data.append('username', username.value.trim());
    data.append('password', password.value.trim());

    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: data
        });

        if (res.ok) {
            window.location.href = '/dashboard';
        } else {
            throw new Error();
        }

    } catch (err) {
        errorDiv.classList.remove('d-none');
        errorDiv.innerText = "Identifiants incorrects";

        /* animation erreur */
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 300);
    }

    btn.disabled = false;
    btn.innerHTML = 'Se connecter';
});

/* THEME */
function applyTheme(theme) {
    document.documentElement.classList.toggle('dark', theme === 'dark');
    document.getElementById('themeToggle').innerHTML =
        theme === 'dark' ? '☀️ Mode clair' : '🌙 Mode sombre';

    localStorage.setItem('theme', theme);
}

const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);

document.getElementById('themeToggle').addEventListener('click', () => {
    const newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    applyTheme(newTheme);
});
</script>

</body>
</html>
